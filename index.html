<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokePhone</title>
    <script src="JS/landingScript.js" defer></script>
    <link rel="stylesheet" href="css/landingStyles.css">
</head>
<body>
    <header class="landing-header">
        <img src="PokePhone.png" alt="Logo de Pokephone">
    </header>
    <main>
        <section class="landing-btn" id="landing-pokedex">
            <img src="svg/pc-svgrepo-com.svg" alt="Icono pokedex">
            <h2>Pokedex</h2>
        </section>
        <section class="landing-btn" id="landing-favorites">
            <img src="svg/star-svgrepo-com.svg" alt="Icono de estrella favoritos">
            <h2>Favoritos</h2>
        </section>
        <section class="landing-btn" id="landing-maps">
            <img src="svg/map-location-pin-svgrepo-com.svg" alt="icono mapas">
            <h2>Mapas</h2>
        </section>
        <section class="landing-btn" id="landing-objects">
            <img src="svg/treasure-chest-svgrepo-com.svg" alt="icono de cofre del tesoro">
            <h2>Objetos</h2>
        </section>
    </main>
    
</body>
</html>
